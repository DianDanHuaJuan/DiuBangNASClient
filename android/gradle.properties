org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Work around Kotlin incremental cache issues on Windows when the project and
# pub cache are on different drives.
kotlin.incremental=false

# 本机 HTTP 代理（Clash / V2RayN 等）。true=开启；false=关闭。
# Java/Gradle 默认不读系统代理；开启后构建期下载走下方 host:port。
# localProxyPort 必须填 HTTP 或 mixed 端口，不要填 SOCKS 端口。
localProxyEnabled=false
localProxyHost=127.0.0.1
localProxyPort=7890
